<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram home</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="instagram-wrapper">
        <div class="instagram-phone">
            <img src="./projeto 01/instagram-celular.png" alt="instagram celular">
        </div>
        <div class="instagram-continue">
            <div class="group">
                  <img src="./projeto 01/instagram-logo.png" class = "instagram-logo" alt="foto do insta"> 
                  <div class="profile-photo">
                     <img src="./projeto 01/husky.jpg" class="insta-perfil" alt="foto do perfil">
                  </div>
                <a href="#" class="instagram-login">Continue with the user</a>
                <a href="#" class='instagram-logout'>Remove account</a>
            </div>
            <div class="group">
                <p class="not-account">Not the user?</p>
                <p class="notaccount">
                   <span class='link-blue'>Switch account</span>
                   or
                   <span class="link-blue">Sign up</span>
                </p>
            </div>
            <div class="get-the-app">
                <p class="get-the-app">Install the app</p>
                <div class="download">
                    <a href="#" class="app-download"></a>
                    <a href="#" class="app-download"></a>
                </div>
            </div>    
       </div>
    </div>
</body>
</html>
